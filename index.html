<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的預告網頁</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000; /* 這裡的底色與圖片底色一致 */
            display: flex;
            flex-direction: column;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 1. 最上方的文字區塊 */
        .header-text-bar {
            width: 100%;
            background-color: transparent; /* 背景透明，與網頁底色一致 */
            color: #0000FF;               /* 文字換成純藍色 */
            text-align: center;
            padding: 15px 0;              /* 與文字等高的關鍵：只保留必要的內距 */
            z-index: 10;
        }

        .header-text-bar h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
            /* 為了讓藍色在黑色背景更突出，加一點微弱的白色陰影 */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        /* 2. 動圖區塊：緊接在文字下方 */
        .gif-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* 確保容器底色也是黑的 */
        }

        .background-gif {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 確保動圖完整顯示，不被裁切 */
        }

        /* 3. 播放按鈕 */
        #play-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header-text-bar">
        <h1>Watch out! 2026/04/27 COMING!</h1>
    </div>

    <div class="gif-container">
        <img src="Kaniki butt.gif" class="background-gif" alt="Background">
    </div>

    <audio id="myAudio" loop>
        <source src="Never gonna give you up.MP3" type="audio/mpeg">
    </audio>

    <button id="play-btn">點擊開啟預告音樂 🎵</button>

    <script>
        const btn = document.getElementById('play-btn');
        const audio = document.getElementById('myAudio');

        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.style.display = 'none';
            }
        });
    </script>

</body>
</html>
